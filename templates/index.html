<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат · Регистрация и модерация</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; padding: 20px; }
        .chat-container { max-width: 1200px; margin: 0 auto; }
        .chat-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .chat-header { background: linear-gradient(135deg, #4f46e5, #7c3aed); padding: 16px 24px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .main-layout { display: flex; height: 500px; }
        .sidebar { width: 260px; background: #f9fafb; border-right: 1px solid #e5e7eb; overflow-y: auto; padding: 16px; }
        .sidebar-title { font-weight: 600; margin: 16px 0 8px 0; color: #374151; }
        .users-list { list-style: none; }
        .user-item { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; cursor: pointer; }
        .user-item:hover { background: #e5e7eb; }
        .admin-badge { background: #ef4444; color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; }
        .moder-badge { background: #f59e0b; color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; }
        .chat-content { flex: 1; display: flex; flex-direction: column; }
        .rooms-tabs { display: flex; gap: 4px; padding: 12px 16px; border-bottom: 1px solid #e5e7eb; }
        .room-tab { padding: 8px 20px; border-radius: 20px; background: transparent; border: none; cursor: pointer; }
        .room-tab.active { background: #4f46e5; color: white; }
        .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; gap: 12px; align-items: flex-start; }
        .message-own { justify-content: flex-end; }
        .message-content { background: #f3f4f6; padding: 8px 12px; border-radius: 16px; max-width: 65%; }
        .message-own .message-content { background: #4f46e5; color: white; }
        .message-name { font-weight: 600; font-size: 0.85rem; cursor: pointer; }
        .message-time { font-size: 0.65rem; opacity: 0.7; margin-left: 8px; }
        .message-text { margin-top: 4px; word-wrap: break-word; }
        .delete-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 0.7rem; margin-left: 8px; }
        .system-message { text-align: center; font-size: 0.75rem; color: #6b7280; padding: 4px; }
        .message-form { display: flex; gap: 12px; padding: 16px; border-top: 1px solid #e5e7eb; }
        .message-input { flex: 1; padding: 12px; border: 1px solid #e5e7eb; border-radius: 30px; outline: none; }
        .send-btn { background: #4f46e5; border: none; border-radius: 50%; width: 48px; height: 48px; color: white; cursor: pointer; }
        @media (max-width: 768px) { .sidebar { display: none; } }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-card">
        <div class="chat-header">
            <h2>💬 Чат с модерацией</h2>
            <div>{{ username }} ({{ role }}) <a href="/logout" style="color:white; margin-left:16px;">Выйти</a></div>
        </div>
        <div class="main-layout">
            <div class="sidebar">
                <div class="sidebar-title"><i class="fas fa-users"></i> Пользователи</div>
                <ul class="users-list" id="usersList"></ul>
                <div class="sidebar-title"><i class="fas fa-shield-alt"></i> Моя роль</div>
                <div>{% if role == 'admin' %}👑 Администратор{% elif role == 'moderator' %}🛡 Модератор{% else %}👤 Пользователь{% endif %}</div>
            </div>
            <div class="chat-content">
                <div class="rooms-tabs" id="roomTabs">
                    <button class="room-tab active" data-room="Общая">🏠 Общая</button>
                    <button class="room-tab" data-room="Случайная">🎲 Случайная</button>
                    <button class="room-tab" data-room="Помощь">🆘 Помощь</button>
                </div>
                <div id="messages" class="messages-area"></div>
                <div class="message-form">
                    <input type="text" id="messageInput" class="message-input" placeholder="Ваше сообщение...">
                    <button class="send-btn" id="sendBtn">📤</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    let socket = null;
    let currentRoom = 'Общая';
    let username = '{{ username }}';
    let role = '{{ role }}';
    
    document.getElementById('sendBtn').onclick = () => {
        const input = document.getElementById('messageInput');
        if(input.value.trim() && socket) {
            socket.emit('message', { text: input.value, room: currentRoom });
            input.value = '';
        }
    };
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') document.getElementById('sendBtn').click();
    });
    
    function addMessage(id, name, text, time, isOwn, msgRole, deleted) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'message-own' : ''}`;
        div.dataset.id = id;
        let roleBadge = '';
        if(msgRole === 'admin') roleBadge = ' <span class="admin-badge">ADMIN</span>';
        else if(msgRole === 'moderator') roleBadge = ' <span class="moder-badge">MODER</span>';
        div.innerHTML = `
            <div class="message-content">
                <div class="message-name">${escapeHtml(name)}${roleBadge}</div>
                <div class="message-text">${escapeHtml(text)}</div>
                <div class="message-time">${time}</div>
            </div>
            ${!isOwn && (role === 'admin' || name === username) ? `<button class="delete-btn" onclick="deleteMessage('${id}')">🗑</button>` : ''}
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
    
    function deleteMessage(msgId) {
        if(confirm('Удалить сообщение?')) socket.emit('delete_message', { messageId: msgId, room: currentRoom });
    }
    
    window.deleteMessage = deleteMessage;
    
    function addSystemMessage(text) {
        const div = document.createElement('div');
        div.className = 'system-message';
        div.textContent = text;
        document.getElementById('messages').appendChild(div);
    }
    
    function loadHistory(history) {
        document.getElementById('messages').innerHTML = '';
        history.forEach(msg => {
            if(!msg.deleted) addMessage(msg.id, msg.name, msg.text, msg.time, msg.name === username, msg.role, msg.deleted);
        });
    }
    
    socket = io();
    socket.emit('join', { room: currentRoom });
    socket.on('history', loadHistory);
    socket.on('message', (msg) => addMessage(msg.id, msg.name, msg.text, msg.time, msg.name === username, msg.role, msg.deleted));
    socket.on('message_update', (data) => {
        const msgs = document.querySelectorAll(`.message[data-id="${data.id}"]`);
        msgs.forEach(msg => msg.remove());
    });
    socket.on('system', addSystemMessage);
    socket.on('users_list', (users) => {
        document.getElementById('usersList').innerHTML = users.map(u => `<li class="user-item"><span>${escapeHtml(u.name)}</span> ${u.role === 'admin' ? '<span class="admin-badge">ADMIN</span>' : (u.role === 'moderator' ? '<span class="moder-badge">MODER</span>' : '')}</li>`).join('');
    });
    
    document.querySelectorAll('.room-tab').forEach(tab => {
        tab.onclick = () => {
            const newRoom = tab.dataset.room;
            if(newRoom === currentRoom) return;
            socket.emit('switch_room', { old_room: currentRoom, new_room: newRoom });
            currentRoom = newRoom;
            document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('messages').innerHTML = '<div class="system-message">⏳ Загрузка...</div>';
        };
    });
    
    function escapeHtml(s) { return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    
    socket.emit('get_users');
</script>
</body>
</html>
