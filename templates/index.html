<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <link rel="manifest" href="/manifest.json">
    <title>МегаЧат · Всё включено</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-gradient-start: #667eea;
            --bg-gradient-end: #764ba2;
            --card-bg: rgba(255,255,255,0.98);
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --message-bg-own: linear-gradient(135deg, #4f46e5, #7c3aed);
            --message-bg-other: #f3f4f6;
            --input-bg: white;
            --header-bg: linear-gradient(135deg, #4f46e5, #7c3aed);
        }
        
        body.dark {
            --bg-gradient-start: #1e1b4b;
            --bg-gradient-end: #0f172a;
            --card-bg: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --border-color: #374151;
            --message-bg-other: #374151;
            --input-bg: #1f2937;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s;
        }
        
        .chat-container { max-width: 1300px; margin: 0 auto; }
        .chat-card { background: var(--card-bg); border-radius: 32px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); transition: background 0.3s; }
        .chat-header { background: var(--header-bg); padding: 16px 24px; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .logo-area h1 { font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
        .header-buttons { display: flex; gap: 10px; align-items: center; }
        .icon-btn { background: rgba(255,255,255,0.2); border: none; border-radius: 50%; width: 40px; height: 40px; color: white; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        .room-badge { background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 40px; font-size: 0.9rem; }
        
        .main-layout { display: flex; height: 600px; }
        .sidebar { width: 280px; background: rgba(0,0,0,0.03); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; overflow-y: auto; }
        body.dark .sidebar { background: rgba(255,255,255,0.03); }
        .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border-color); }
        .sidebar-title { font-weight: 600; margin-bottom: 12px; color: var(--text-primary); font-size: 0.8rem; text-transform: uppercase; }
        .users-list { list-style: none; }
        .user-item { display: flex; align-items: center; gap: 10px; padding: 8px; cursor: pointer; border-radius: 8px; color: var(--text-primary); transition: 0.2s; }
        .user-item:hover { background: var(--border-color); }
        .user-status { width: 8px; height: 8px; border-radius: 50%; background: #10b981; display: inline-block; margin-right: 8px; }
        .user-status.offline { background: #6b7280; }
        
        .chat-content { flex: 1; display: flex; flex-direction: column; }
        .rooms-tabs { display: flex; gap: 4px; padding: 12px 16px; border-bottom: 1px solid var(--border-color); overflow-x: auto; }
        .room-tab { padding: 8px 20px; border-radius: 20px; background: transparent; border: none; cursor: pointer; color: var(--text-secondary); transition: 0.2s; white-space: nowrap; }
        .room-tab:hover { background: var(--border-color); }
        .room-tab.active { background: #4f46e5; color: white; }
        
        .search-bar { padding: 8px 16px; border-bottom: 1px solid var(--border-color); }
        .search-input { width: 100%; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 20px; background: var(--input-bg); color: var(--text-primary); outline: none; }
        
        .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; gap: 12px; align-items: flex-start; animation: fadeIn 0.2s ease; position: relative; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; cursor: pointer; flex-shrink: 0; }
        .message-content { flex: 1; background: var(--message-bg-other); padding: 10px 14px; border-radius: 18px; border-top-left-radius: 4px; color: var(--text-primary); max-width: 65%; }
        .message-own { justify-content: flex-end; }
        .message-own .message-content { background: var(--message-bg-own); color: white; border-top-left-radius: 18px; border-top-right-radius: 4px; }
        .message-header { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; margin-bottom: 5px; }
        .message-name { font-weight: 700; font-size: 0.85rem; cursor: pointer; }
        .message-time { font-size: 0.65rem; opacity: 0.7; }
        .message-text { font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .message-reactions { display: flex; gap: 8px; margin-top: 6px; font-size: 0.8rem; }
        .reaction { cursor: pointer; background: rgba(0,0,0,0.05); padding: 2px 6px; border-radius: 20px; display: inline-flex; align-items: center; gap: 4px; }
        .message-actions { position: absolute; right: 10px; top: 5px; opacity: 0; transition: 0.2s; display: flex; gap: 5px; }
        .message:hover .message-actions { opacity: 1; }
        .msg-action { background: #374151; border: none; border-radius: 50%; width: 28px; height: 28px; color: white; cursor: pointer; font-size: 0.7rem; }
        .image-message { max-width: 200px; border-radius: 12px; cursor: pointer; margin-top: 5px; }
        .voice-message { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.05); padding: 6px 12px; border-radius: 20px; }
        .system-message { text-align: center; font-size: 0.75rem; color: var(--text-secondary); padding: 6px; }
        
        .typing-indicator { padding: 6px 16px; font-size: 0.75rem; color: var(--text-secondary); font-style: italic; }
        .message-form { display: flex; gap: 12px; padding: 16px 20px; background: var(--card-bg); border-top: 1px solid var(--border-color); }
        .message-input { flex: 1; padding: 12px 18px; border: 1px solid var(--border-color); border-radius: 30px; background: var(--input-bg); color: var(--text-primary); outline: none; }
        .send-btn, .attach-btn, .emoji-btn { width: 48px; height: 48px; background: #4f46e5; border: none; border-radius: 50%; color: white; cursor: pointer; transition: 0.2s; }
        .send-btn:hover, .attach-btn:hover, .emoji-btn:hover { background: #4338ca; transform: scale(1.05); }
        .emoji-picker { position: absolute; bottom: 80px; left: 20px; background: var(--card-bg); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); padding: 10px; display: none; grid-template-columns: repeat(6, 1fr); gap: 8px; z-index: 100; }
        .emoji-picker.show { display: grid; }
        .emoji { cursor: pointer; font-size: 1.5rem; text-align: center; transition: 0.1s; }
        .emoji:hover { transform: scale(1.2); }
        .notification { position: fixed; bottom: 20px; right: 20px; background: #4f46e5; color: white; padding: 10px 20px; border-radius: 30px; animation: slideIn 0.3s; z-index: 1000; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .context-menu { position: fixed; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 1000; display: none; }
        .context-menu-item { padding: 8px 16px; cursor: pointer; color: var(--text-primary); }
        .context-menu-item:hover { background: var(--border-color); }
        
        @media (max-width: 768px) { .sidebar { display: none; } .message-content { max-width: 85%; } }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-card">
        <div class="chat-header">
            <div class="logo-area"><h1><i class="fas fa-comet"></i> МегаЧат</h1></div>
            <div class="header-buttons">
                <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
                <button class="icon-btn" id="settingsBtn"><i class="fas fa-cog"></i></button>
                <button class="icon-btn" id="notifyToggle"><i class="fas fa-bell"></i></button>
                <div class="room-badge"><span id="currentRoomName">Общая</span></div>
            </div>
        </div>
        
        <div id="loginPanel" class="sidebar-section" style="padding: 40px; text-align: center;">
            <h2 style="margin-bottom: 20px;">✨ Добро пожаловать</h2>
            <input type="text" id="usernameInput" class="search-input" placeholder="Ваше имя..." style="max-width: 300px;">
            <button class="icon-btn" id="joinBtn" style="background: #4f46e5; border-radius: 20px; width: auto; padding: 10px 30px; margin-top: 10px;">Войти</button>
        </div>
        
        <div id="chatPanel" style="display: none;">
            <div class="main-layout">
                <div class="sidebar">
                    <div class="sidebar-section"><div class="sidebar-title"><i class="fas fa-users"></i> Онлайн</div><ul class="users-list" id="usersList"></ul></div>
                    <div class="sidebar-section"><div class="sidebar-title"><i class="fas fa-thumbtack"></i> Закреплённые</div><div id="pinnedList"></div></div>
                    <div class="sidebar-section"><div class="sidebar-title"><i class="fas fa-images"></i> Галерея</div><div id="galleryList"></div></div>
                </div>
                <div class="chat-content">
                    <div class="rooms-tabs" id="roomTabs">
                        <button class="room-tab active" data-room="Общая"><i class="fas fa-home"></i> Общая</button>
                        <button class="room-tab" data-room="Случайная"><i class="fas fa-dice"></i> Случайная</button>
                        <button class="room-tab" data-room="Помощь"><i class="fas fa-life-ring"></i> Помощь</button>
                    </div>
                    <div class="search-bar"><input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск сообщений..."></div>
                    <div id="messages" class="messages-area"></div>
                    <div id="typingIndicator" class="typing-indicator"></div>
                    <div class="message-form">
                        <button class="emoji-btn" id="emojiBtn"><i class="far fa-smile"></i></button>
                        <button class="attach-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
                        <button class="attach-btn" id="voiceBtn"><i class="fas fa-microphone"></i></button>
                        <input type="text" id="messageInput" class="message-input" placeholder="Напишите сообщение...">
                        <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                    <div id="emojiPicker" class="emoji-picker"></div>
                    <input type="file" id="fileInput" style="display:none" accept="image/*">
                </div>
            </div>
        </div>
    </div>
</div>
<div id="contextMenu" class="context-menu"></div>

<script>
    let socket = null, currentRoom = 'Общая', userName = '', typingTimeout = null,
        pinnedMessages = [], currentTheme = 'light', notifications = true,
        lastMessages = [], unreadCounts = {}, messageIdCounter = 0;
    
    const emojis = ['😀','😂','❤️','👍','🎉','🔥','😍','🥹','😭','🤔','👋','🙏','✨','💯','😎','🥳','💔','😢','🤣','😡','🤯','🥰','😱','😈','💀','👻','🐱','🐶','🍕','☕','⭐','💡'];
    
    function initEmojiPicker() {
        const picker = document.getElementById('emojiPicker');
        picker.innerHTML = '';
        emojis.forEach(e => {
            const span = document.createElement('span');
            span.className = 'emoji';
            span.textContent = e;
            span.onclick = () => { document.getElementById('messageInput').value += e; picker.classList.remove('show'); };
            picker.appendChild(span);
        });
    }
    document.getElementById('emojiBtn')?.addEventListener('click', () => document.getElementById('emojiPicker').classList.toggle('show'));
    document.getElementById('attachBtn')?.addEventListener('click', () => document.getElementById('fileInput').click());
    
    document.getElementById('fileInput')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                socket.emit('image', { name: userName, room: currentRoom, image: ev.target.result });
            };
            reader.readAsDataURL(file);
        }
        e.target.value = '';
    });
    
    function notify(title, body) { if (notifications && Notification.permission === 'granted') new Notification(title, { body }); }
    if (Notification.permission !== 'granted' && Notification.permission !== 'denied') Notification.requestPermission();
    
    function toggleTheme() { currentTheme = currentTheme === 'light' ? 'dark' : 'light'; document.body.classList.toggle('dark'); localStorage.setItem('theme', currentTheme); }
    document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);
    if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark'); currentTheme = 'dark'; }
    
    document.getElementById('notifyToggle')?.addEventListener('click', () => { notifications = !notifications; notify('Уведомления', notifications ? 'включены' : 'выключены'); });
    
    let typingUsers = {};
    function updateTypingIndicator() {
        const names = Object.keys(typingUsers).filter(n => n !== userName);
        document.getElementById('typingIndicator').innerHTML = names.length ? (names.length === 1 ? `${names[0]} печатает...` : `${names.length} человек печатают...`) : '';
    }
    
    function showContextMenu(e, msgId, text) {
        e.preventDefault();
        const menu = document.getElementById('contextMenu');
        menu.innerHTML = `<div class="context-menu-item" onclick="copyMessage('${text.replace(/'/g, "\\'")}')">📋 Копировать</div>
                         <div class="context-menu-item" onclick="replyTo('${msgId}')">💬 Ответить</div>
                         <div class="context-menu-item" onclick="deleteMessage('${msgId}')">🗑 Удалить</div>`;
        menu.style.display = 'block';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        setTimeout(() => { menu.style.display = 'none'; }, 3000);
    }
    
    window.copyMessage = (text) => { navigator.clipboard.writeText(text); addSystemMessage('📋 Скопировано'); };
    window.replyTo = (msgId) => { document.getElementById('messageInput').value = `> ${msgId}\n`; document.getElementById('messageInput').focus(); };
    window.deleteMessage = (msgId) => { socket.emit('delete_message', { messageId: msgId, room: currentRoom }); };
    window.pinMessage = (text, name, time) => { if(pinnedMessages.length<5) { pinnedMessages.unshift({text,name,time}); updatePinnedList(); addSystemMessage(`📌 ${name} закрепил сообщение`); } else alert('Максимум 5 закреплений'); };
    
    function updatePinnedList() {
        const container = document.getElementById('pinnedList');
        if(!container) return;
        container.innerHTML = pinnedMessages.length ? pinnedMessages.map(p => `<div style="font-size:0.7rem; margin-bottom:6px; border-left:2px solid #4f46e5; padding-left:6px;"><strong>${escapeHtml(p.name)}</strong>: ${escapeHtml(p.text.substring(0,40))}</div>`).join('') : 'Нет закреплённых';
    }
    
    function updateGallery(images) { document.getElementById('galleryList').innerHTML = images.map(img => `<img src="${img}" style="width:60px; height:60px; object-fit:cover; border-radius:8px; margin:2px; cursor:pointer;" onclick="window.open('${img}')">`).join('') || 'Нет изображений'; }
    
    let allImages = [];
    function addMessage(id, name, text, time, isOwn, img=null) {
        const messagesDiv = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'message-own' : ''}`;
        div.dataset.id = id;
        div.oncontextmenu = (e) => showContextMenu(e, id, text);
        div.innerHTML = `<div class="message-avatar" onclick="mentionUser('${escapeHtml(name)}')">${name.charAt(0).toUpperCase()}</div>
            <div class="message-content">
                <div class="message-header"><span class="message-name" onclick="mentionUser('${escapeHtml(name)}')">${escapeHtml(name)}</span><span class="message-time">${time}</span></div>
                <div class="message-text">${escapeHtml(text)}${img ? `<br><img src="${img}" class="image-message" onclick="window.open('${img}')">` : ''}</div>
                <div class="message-reactions" id="reactions-${id}"></div>
            </div>
            <div class="message-actions">
                <button class="msg-action" onclick="reactTo('${id}', '👍')"><i class="fas fa-thumbs-up"></i></button>
                <button class="msg-action" onclick="reactTo('${id}', '❤️')"><i class="fas fa-heart"></i></button>
                <button class="msg-action" onclick="pinMessage('${escapeHtml(text)}','${escapeHtml(name)}','${time}')"><i class="fas fa-thumbtack"></i></button>
            </div>`;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        if(img) allImages.push(img);
        updateGallery(allImages);
    }
    
    window.mentionUser = (name) => { document.getElementById('messageInput').value += `@${name} `; document.getElementById('messageInput').focus(); };
    window.reactTo = (msgId, reaction) => { socket.emit('react', { messageId: msgId, reaction, room: currentRoom }); };
    
    function addSystemMessage(text) { const div = document.createElement('div'); div.className = 'system-message'; div.textContent = text; document.getElementById('messages').appendChild(div); }
    function escapeHtml(s) { return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    
    function loadHistory(history) {
        document.getElementById('messages').innerHTML = '';
        allImages = [];
        history.forEach(msg => addMessage(msg.id || Date.now()+Math.random(), msg.name, msg.text, msg.time, msg.name === userName, msg.image));
    }
    
    document.getElementById('joinBtn').onclick = () => {
        userName = document.getElementById('usernameInput').value.trim();
        if(!userName) return alert('Введите имя');
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('chatPanel').style.display = 'block';
        initEmojiPicker();
        socket = io();
        socket.emit('join', { name: userName, room: currentRoom });
        socket.on('history', loadHistory);
        socket.on('message', (msg) => addMessage(msg.id, msg.name, msg.text, msg.time, msg.name === userName, msg.image));
        socket.on('users', (users) => { document.getElementById('usersList').innerHTML = users.map(u => `<li class="user-item" onclick="mentionUser('${escapeHtml(u)}')"><span class="user-status"></span> ${escapeHtml(u)}</li>`).join(''); });
        socket.on('typing', (data) => { if(data.typing) typingUsers[data.name]=true; else delete typingUsers[data.name]; updateTypingIndicator(); });
        socket.on('system', addSystemMessage);
        socket.on('reactions', ({messageId, reactions}) => { const container = document.getElementById(`reactions-${messageId}`); if(container) container.innerHTML = Object.entries(reactions).map(([r,c]) => `<span class="reaction">${r} ${c}</span>`).join(''); });
        socket.on('image', ({name, image, time}) => addMessage(Date.now(), name, '[Изображение]', time, name===userName, image));
    };
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if(text && socket) { socket.emit('message', { name: userName, text, room: currentRoom }); input.value = ''; }
    }
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendMessage();
        if(socket) { socket.emit('typing', { name: userName, room: currentRoom, typing: true }); clearTimeout(typingTimeout); typingTimeout = setTimeout(() => socket.emit('typing', { name: userName, room: currentRoom, typing: false }), 1000); }
    });
    
    document.querySelectorAll('.room-tab').forEach(tab => {
        tab.onclick = () => {
            const newRoom = tab.dataset.room;
            if(newRoom === currentRoom || !socket) return;
            socket.emit('switch_room', { name: userName, old_room: currentRoom, new_room: newRoom });
            currentRoom = newRoom;
            document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('currentRoomName').innerText = currentRoom;
            document.getElementById('messages').innerHTML = '<div class="system-message">⏳ Загрузка сообщений...</div>';
        };
    });
    
    let lastId = 0;
    setInterval(() => { if(currentRoom !== lastId) { lastId = currentRoom; document.title = 'МегаЧат'; } }, 1000);
</script>
</body>
</html>
